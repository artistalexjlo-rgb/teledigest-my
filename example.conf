[telegram]
api_id = 123456
api_hash = "your_api_hash"
bot_token = "123456:ABCDEF"
sessions_dir = "data"

[bot]
channels = ["@news", "@events"]
summary_target = "@digest_channel"
summary_hour = 21
allowed_users = "@admin,123456789"
# When true, post the full digest to Telegraph and send a compact brief to Telegram.
summary_brief = false

[storage]
db_path = "/var/lib/teledigest/messages.db"

[logging]
level = "INFO"

[llm]
api_key = "YOUR_OPENAI_API_KEY"
model = "gpt-5.1-mini"

[llm.prompts]
system = """
You are a Telegram digest bot. Produce concise, well-structured daily summaries.
"""

user = """
Summarize the following messages for {DAY}:

{MESSAGES}
"""

# Brief prompts — only used when [bot].summary_brief = true.
# {DIGEST} is replaced with the full digest generated by system/user above.
system_brief = """
You are a Telegram digest bot. Produce a minimal, single-message summary.
"""

user_brief = """
Write a brief summary (max 4000 characters, HTML allowed) of the digest below.
Keep only the most important points.

{DIGEST}
"""

[telegraph]
# author_name is shown as the byline on the Telegraph page (max 128 chars).
author_name = "TeleDigest"
# author_url is an optional link attached to the byline (leave empty to omit).
author_url = ""
# access_token — leave unset to auto-create and cache a token in the data dir.
# access_token = "your_telegraph_token"

[storage.rag]
# List of keywords for the retrieval of relevant messages for the LLM prompt
keywords = [
    # Ukrainian
    "війна", "наступ*", "контрнаступ*", "фронт", "оборон*", "артилер*", "дрон*",
    # Russian
    "войн*", "наступлен*", "обстрел*", "ракет*", "дрон*", "ПВО",
    # English
    "war", "offensive", "artillery", "drone*", "strike*", "sanctions",
]

[google]
# Optional. If set, the daily-samples directory is uploaded to a Google Drive
# folder after each scheduler run. Auth uses an OAuth user-creds flow (no
# service account key — that path is blocked by org policy on many GCP setups).
#
# How to set up:
#   1. In GCP Console, create an OAuth client ID of type "Desktop app",
#      download the JSON, save as google-credentials.json
#   2. On your local machine, run once:
#        python scripts/drive_oauth_init.py google-credentials.json
#      A browser opens, you authorize, google-token.json is produced
#   3. Copy both google-credentials.json and google-token.json to the VPS,
#      next to the SQLite DB (Coolify mount path)
#   4. Set drive_folder_id below and uncomment the section
#
# drive_folder_id = "YOUR_DRIVE_FOLDER_ID_HERE"
# credentials_path = "/home/teledigest/data/google-credentials.json"
# token_path = "/home/teledigest/data/google-token.json"
# enabled = true
